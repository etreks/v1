<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selahe Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #0f0f0f;
    }

    .popup-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .popup-logo {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .popup-logo span {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #0f0f0f;
    }

    .popup-logo svg {
      opacity: 0.8;
    }

    .popup-tagline {
      font-size: 10px;
      color: #999;
      margin-left: auto;
      font-weight: 400;
    }

    .popup-section {
      padding: 14px 18px;
      border-bottom: 1px solid #f5f5f5;
    }

    .popup-section:last-child {
      border-bottom: none;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #bbb;
      margin-bottom: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-text {
      font-size: 12px;
      color: #444;
      font-weight: 400;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 100px;
      letter-spacing: 0.2px;
    }

    .status-badge.connected {
      background: #dcfce7;
      color: #16a34a;
    }

    .status-badge.disconnected {
      background: #fef2f2;
      color: #dc2626;
    }

    .status-badge.checking {
      background: #fef9c3;
      color: #ca8a04;
    }

    .queue-info {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
    }

    .popup-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #444;
      text-decoration: none;
      padding: 7px 0;
      border-radius: 6px;
      transition: color 0.15s;
      font-weight: 400;
    }

    .popup-link:hover {
      color: #0f0f0f;
    }

    .popup-link svg {
      flex-shrink: 0;
      opacity: 0.5;
    }

    .popup-link:hover svg {
      opacity: 0.8;
    }

    .open-selahe-btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      background: #0f0f0f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-align: center;
      letter-spacing: 0.1px;
    }

    .open-selahe-btn:hover {
      background: #333;
    }

    .offline-queue-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .sync-btn {
      font-size: 10px;
      font-weight: 600;
      color: #0f0f0f;
      background: none;
      border: 1px solid #e0e0e0;
      padding: 3px 9px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }

    .sync-btn:hover {
      background: #f5f5f5;
    }

    .footer-note {
      font-size: 10px;
      color: #ccc;
      text-align: center;
      padding: 10px 18px 14px;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 C 14 4, 10 7, 12 9 M12 22 C 10 20, 14 17, 12 15 M2 12 C 4 10, 7 14, 9 12 M22 12 C 20 14, 17 10, 15 12 M4.9 4.9 C 7 5.5, 6 8.5, 9.5 9.5 M19.1 19.1 C 17 18.5, 18 15.5, 14.5 14.5 M4.9 19.1 C 5.5 17, 8.5 18, 9.5 14.5 M19.1 4.9 C 18.5 7, 15.5 6, 14.5 9.5"/>
        <circle cx="12" cy="12" r="2.5"/>
      </svg>
      <span>Selahe</span>
    </div>
    <span class="popup-tagline">Gemini Bridge</span>
  </div>

  <div class="popup-section">
    <div class="section-label">Connection Status</div>
    <div class="status-row">
      <span class="status-text">Selahe App (localhost:3000)</span>
      <span class="status-badge checking" id="selahe-status-badge">Checking...</span>
    </div>
    <div class="queue-info" id="queue-info" style="display:none;"></div>
    <div class="offline-queue-row" id="sync-row" style="display:none;">
      <span class="queue-info" style="margin:0;" id="queue-count"></span>
      <button class="sync-btn" id="sync-now-btn">Sync Now</button>
    </div>
  </div>

  <div class="popup-section">
    <div class="section-label">Quick Actions</div>
    <button class="open-selahe-btn" id="open-selahe-btn">Open Selahe App</button>
  </div>

  <div class="popup-section">
    <div class="section-label">Resources</div>
    <a class="popup-link" href="#" id="gem-setup-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
      </svg>
      Set up the Selahe Gem on Gemini
    </a>
    <a class="popup-link" href="https://gemini.google.com" target="_blank" id="open-gemini-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open Gemini
    </a>
  </div>

  <div class="footer-note">Active on gemini.google.com</div>

  <script src="popup.js"></script>
</body>
</html>
